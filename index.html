<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIGIL·AI — Secure Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:            #07090c;
      --bg-deep:       #040508;
      --panel:         #0d1117;
      --panel-alt:     #111820;
      --card:          #131e2b;
      --card-hover:    #192637;
      --border:        #1a2d40;
      --border-bright: #243d57;

      --accent:        #00e5ff;
      --accent-dim:    rgba(0, 229, 255, 0.10);
      --accent-glow:   rgba(0, 229, 255, 0.28);
      --accent-mid:    rgba(0, 229, 255, 0.55);

      --danger:        #ff4444;
      --danger-dim:    rgba(255, 68, 68, 0.10);
      --warning:       #ffb347;
      --success:       #00c896;
      --success-dim:   rgba(0, 200, 150, 0.10);

      --text-1: #dde8f0;
      --text-2: #6e8ba5;
      --text-3: #2e4a63;

      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;

      --r:    8px;
      --r-sm: 4px;
      --r-lg: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    #login-screen {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-deep);
      overflow: hidden;
    }

    #login-screen::before {
      content: '';
      position: absolute;
      inset: -50%;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: grid-drift 30s linear infinite;
    }
    @keyframes grid-drift {
      from { transform: translate(0,0); }
      to   { transform: translate(48px, 48px); }
    }

    #login-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, var(--bg-deep) 80%);
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 420px;
      max-width: calc(100vw - 48px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 44px 40px 40px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.06),
        0 24px 64px rgba(0,0,0,0.7),
        0 0 80px rgba(0,229,255,0.04);
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-mid), transparent);
      border-radius: 1px;
    }

    .login-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .login-logo {
      width: 52px;
      height: 52px;
      border-radius: var(--r);
      background: var(--accent-dim);
      border: 1px solid rgba(0,229,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .login-logo::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: calc(var(--r) + 4px);
      border: 1px solid rgba(0,229,255,0.08);
    }
    .login-logo svg { filter: drop-shadow(0 0 8px rgba(0,229,255,0.5)); }

    .login-title {
      text-align: center;
    }
    .login-title h1 {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--text-1);
    }
    .login-title h1 span { color: var(--accent); }
    .login-title p {
      font-size: 12px;
      color: var(--text-3);
      letter-spacing: 0.08em;
      margin-top: 6px;
      font-family: var(--mono);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--text-2);
      text-transform: uppercase;
    }
    .field-input-wrap {
      position: relative;
    }
    .field-input-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }
    .field-input {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text-1);
      font-family: var(--mono);
      font-size: 13px;
      padding: 11px 14px 11px 38px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.04em;
    }
    .field-input:focus {
      border-color: rgba(0,229,255,0.4);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.07);
    }
    .field-input::placeholder { color: var(--text-3); }

    .login-error {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--danger);
      letter-spacing: 0.05em;
      padding: 9px 12px;
      background: var(--danger-dim);
      border: 1px solid rgba(255,68,68,0.2);
      border-radius: var(--r-sm);
      display: none;
    }
    .login-error.visible { display: block; }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #050a0e;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 0 24px rgba(0,229,255,0.2);
    }
    .login-btn:hover {
      opacity: 0.9;
      box-shadow: 0 0 36px rgba(0,229,255,0.35);
      transform: translateY(-1px);
    }
    .login-btn:active { transform: translateY(0); }

    .login-footer {
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }

    @media (max-width: 500px) {
      .login-card { padding: 32px 24px 28px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

<div id="login-screen" role="dialog" aria-modal="true" aria-label="Authentication required">
  <div class="login-card">

    <div class="login-header">
      <div class="login-logo" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="13" cy="13" r="5" stroke="#00e5ff" stroke-width="1.5"/>
          <circle cx="13" cy="13" r="9.5" stroke="#00e5ff" stroke-width="1" stroke-dasharray="2.5 2.5" opacity="0.5"/>
          <line x1="13" y1="1" x2="13" y2="5"   stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="13" y1="21" x2="13" y2="25"  stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1"  y1="13" x2="5"  y2="13"  stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="21" y1="13" x2="25" y2="13"  stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="login-title">
        <h1>VIGIL<span>·</span>AI</h1>
        <p>SEARCH &amp; RESCUE · COMMAND INTERFACE</p>
      </div>
    </div>

    <div class="login-form">
      <div class="field-group">
        <label class="field-label" for="login-user">Operator ID</label>
        <div class="field-input-wrap">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="7" cy="5" r="2.5" stroke="#6e8ba5" stroke-width="1.2"/>
            <path d="M2 12c0-2.761 2.239-5 5-5s5 2.239 5 5" stroke="#6e8ba5" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <input class="field-input" id="login-user" type="text"
            placeholder="Enter username" autocomplete="username" spellcheck="false" />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="login-pass">Access Code</label>
        <div class="field-input-wrap">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2.5" y="6" width="9" height="6.5" rx="1.5" stroke="#6e8ba5" stroke-width="1.2"/>
            <path d="M4.5 6V4.5a2.5 2.5 0 015 0V6" stroke="#6e8ba5" stroke-width="1.2" stroke-linecap="round"/>
            <circle cx="7" cy="9" r="1" fill="#6e8ba5"/>
          </svg>
          <input class="field-input" id="login-pass" type="password"
            placeholder="Enter password" autocomplete="current-password" />
        </div>
      </div>

      <div class="login-error" id="login-error" role="alert">
        &#10007; &nbsp;Wrong credentials. Access denied.
      </div>

      <button class="login-btn" id="login-btn" type="button">
        Authenticate &amp; Enter
      </button>
    </div>

    <div class="login-footer">
      VIGIL·AI — Raspberry Pi 5 · YOLOv8 · Secure Shell v2.1
    </div>
  </div>
</div>

<script>
'use strict';

const VALID_USERS = {
  'amanidhiaelhak': '15112003',
  'fennourlyes': '08122003'
};

const loginUser = document.getElementById('login-user');
const loginPass = document.getElementById('login-pass');
const loginBtn  = document.getElementById('login-btn');
const loginErr  = document.getElementById('login-error');

function attemptLogin() {
  const u = loginUser.value.trim();
  const p = loginPass.value;

  if (VALID_USERS[u] === p) {
    window.location.href = 'dashboard.html';
  } else {
    loginErr.classList.add('visible');
    loginPass.value = '';
    loginPass.focus();
    setTimeout(() => loginErr.classList.remove('visible'), 3000);
  }
}

loginBtn.addEventListener('click', attemptLogin);
loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
loginUser.addEventListener('keydown', e => { if (e.key === 'Enter') loginPass.focus(); });

window.addEventListener('load', () => loginUser.focus());
</script>
</body>
</html>
